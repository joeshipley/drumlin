# Lets you run `cargo xtask bundle drumlin --release` to produce the .clap bundle.
[alias]
xtask = "run --package xtask --release --"

# When a dependency's newest version needs a newer rustc than ours, fall back to
# the latest version that DOES build on our toolchain instead of erroring.
[resolver]
incompatible-rust-versions = "fallback"

# Fetch git dependencies (the shared synth_core) over the system git + SSH key,
# so the private repo authenticates with your credentials.
[net]
git-fetch-with-cli = true
